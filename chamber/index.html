<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber of Commerce - Home</title>
    <meta name="description" content="Welcome to the Chamber of Commerce home page. Connecting local businesses, driving growth, and building community.">
    <meta name="author" content="Gabriella Mujinga">
    
    <meta property="og:title" content="Chamber of Commerce - Home">
    <meta property="og:description" content="Connecting local businesses, driving growth, and building community.">
    <meta property="og:image" content="https://gabriellailunga.github.io/wdd231/chamber/images/share-preview.jpg">
    <meta property="og:url" content="https://gabriellailunga.github.io/wdd231/chamber/index.html">
    
    <link rel="icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">
    
    <script src="scripts/date.js" defer></script>
    <script src="scripts/home.js" defer></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="images/logo.png" alt="Chamber Logo">
        </div>
        <button id="menu-button">Menu</button>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li><a href="#">Join</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-box">
                <picture>
                    <source srcset="images/hero-large.jpg" media="(min-width: 640px)">
                    <img src="images/johannesburg-view.jpg" alt="Johannesburg city center skyline view" class="hero-image">
                </picture>
                <div class="cta-overlay">
                    <h1>Empower Your Local Business</h1>
                    <p>Join the Chamber today to connect, grow, and thrive in our community.</p>
                    <a href="join.html" class="cta-btn">Join Now</a>
                </div>
            </div>
        </section>

        <section class="info-section">
            <div class="card weather-card">
                <h2>Weather</h2>
                <div class="weather-current">
                    <div class="temp-wrapper">
                        <span id="current-temp">--</span>°C
                    </div>
                    <img id="weather-icon" src="https://openweathermap.org/img/wn/10d@2x.png" alt="Weather Icon">
                </div>
                <p id="weather-desc">Loading...</p>
                <hr>
                <div class="forecast-grid" id="forecast-container"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Gabriella Mujinga | WDD231 Course Project</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
